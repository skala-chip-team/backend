spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/skala_chip
    username: ${DB_USERNAME:skala}
    password: ${DB_PASSWORD:skala}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:skala-chip-secret-key-placeholder}
  expiration: 86400000

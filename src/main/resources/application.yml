spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/skala_chip}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    defer-datasource-initialization: true
    hibernate:
      # validate: 엔티티-DB 스키마 일치만 검증하고 테이블을 생성/변경하지 않는다.
      # 스키마는 AI 시뮬레이션/DB 측이 소유하므로 백엔드가 자동 DDL(update)로
      # 빈 테이블을 만들거나 스키마 불일치를 가리는 것을 막는다. (불일치 시 기동 실패)
      ddl-auto: ${JPA_DDL_AUTO:validate}
    # 기본 false: SQL 로그가 앱 로그(스케줄러 INFO 등)를 밀어내고 로테이션을 유발하므로 끈다.
    # 디버깅 시 SHOW_SQL=true 로 일시적으로 켤 수 있다.
    show-sql: ${SHOW_SQL:false}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

ai:
  # 같은 네임스페이스의 AI 재조정 에이전트(skala-chip-ai) 서비스 주소
  base-url: ${AI_BASE_URL:http://skala-chip-ai:8000}
  # 연결 타임아웃 (ms)
  connect-timeout-ms: ${AI_CONNECT_TIMEOUT_MS:3000}
  # 응답 타임아웃 (ms). /run 은 LLM 호출이라 길게 잡는다.
  read-timeout-ms: ${AI_READ_TIMEOUT_MS:120000}

jwt:
  # HS256 서명에 최소 32바이트 이상의 키가 필요하다.
  # 운영 환경에서는 반드시 JWT_SECRET 환경변수로 안전한 값을 주입할 것.
  secret: ${JWT_SECRET:skala-chip-secret-key-for-dev-only!!}
  # Access Token 만료 시간 (ms). 86400000 = 24시간
  expiration: 86400000

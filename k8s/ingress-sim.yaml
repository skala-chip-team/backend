apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skala-chip-sim-ingress
  namespace: skala3-finalproj-class3-team10
  annotations:
    # AI(skala-chip-ai)에는 CORS 미들웨어가 없어, 외부 오리진(예: Vercel 프론트)에서
    # 브라우저로 /sim 을 직접 호출할 수 있도록 ingress 단에서 CORS 를 부여한다.
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: public-nginx
  rules:
    - host: skala-chip-team10.skala25a.project.skala-ai.com
      http:
        paths:
          # AI 시뮬레이션 제어 (/sim/*) — 누구나 프론트에서 sim 시작/정지 가능
          - path: /sim
            pathType: Prefix
            backend:
              service:
                name: skala-chip-ai
                port:
                  number: 8000
          # AI Swagger (FastAPI /docs, /openapi.json)
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: skala-chip-ai
                port:
                  number: 8000
          - path: /openapi.json
            pathType: ImplementationSpecific
            backend:
              service:
                name: skala-chip-ai
                port:
                  number: 8000

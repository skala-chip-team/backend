apiVersion: apps/v1
kind: Deployment
metadata:
  name: skala-chip-backend
  namespace: skala3-finalproj-class3-team10

spec:
  replicas: 1
  selector:
    matchLabels:
      app: skala-chip-backend
  template:
    metadata:
      labels:
        app: skala-chip-backend
    spec:
      containers:
        - name: skala-chip-backend
          image: amdp-registry.skala-ai.com/skala26a-ai3/skala-chip-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            # application.yml 이 읽는 환경변수명(DB_URL/DB_USERNAME/DB_PASSWORD)과 통일.
            - name: DB_URL
              value: jdbc:postgresql://postgres.skala3-finalproj-class3-team10.svc.cluster.local:5432/skala_chip
            - name: DB_USERNAME
              value: admin
            - name: DB_PASSWORD
              value: admin1234
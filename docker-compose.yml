services:
  postgres:
    image: postgres:16
    container_name: skala-chip-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-skala_chip}
      POSTGRES_USER: ${POSTGRES_USER:-skala}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skala}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
